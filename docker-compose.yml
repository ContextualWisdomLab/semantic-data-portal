services:
  semantic-data-portal:
    build:
      context: .
    environment:
      SDP_SQLITE_PATH: /data/sdp-evidence.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - sdp-evidence:/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  sdp-evidence:
