name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: API integration suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.12'
      - name: Install dependencies
        # Hash-pinned per OpenSSF Scorecard Pinned-Dependencies; mirrors the
        # pins in pyproject.toml. Recompile with:
        # uv pip compile --generate-hashes --universal --python-version 3.12 requirements-test.in -o requirements-test.txt
        run: python -m pip install --disable-pip-version-check --no-cache-dir --require-hashes -r requirements-test.txt
      - name: Run tests
        run: python -m pytest
        env:
          PYTHONPATH: src
