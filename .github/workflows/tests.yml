name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    name: API integration suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        # Hash-pinned per OpenSSF Scorecard Pinned-Dependencies; mirrors the
        # pins in pyproject.toml. Recompile with:
        # uv pip compile --generate-hashes --universal --python-version 3.12 requirements-test.in -o requirements-test.txt
        run: python -m pip install --disable-pip-version-check --no-cache-dir --require-hashes -r requirements-test.txt
      - name: Run tests
        run: python -m pytest
        env:
          PYTHONPATH: src
