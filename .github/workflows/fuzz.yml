name: fuzz

# Two layers of fuzzing:
#   * Hypothesis property tests — fast, cross-platform, run as part of pytest.
#   * Atheris coverage-guided harnesses — bounded wall-clock budget so PR cost
#     stays small; an optional nightly job fuzzes longer.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 3 * * *"  # nightly, longer budget
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fuzz-${{ github.ref }}
  cancel-in-progress: true

jobs:
  property-tests:
    name: Hypothesis property tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --disable-pip-version-check --no-cache-dir --require-hashes -r requirements-test.txt
      - name: Run property-based fuzz tests
        run: python -m pytest tests/fuzz/test_fuzz_properties.py -q
        env:
          PYTHONPATH: src

  atheris:
    name: Atheris coverage-guided (bounded)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          # Atheris supports CPython <= 3.12.
          python-version: "3.12"
      - name: Install (with atheris)
        run: |
          python -m pip install --disable-pip-version-check --no-cache-dir --require-hashes -r requirements-test.txt
          # clang ships with the ubuntu runner; atheris builds against libFuzzer.
          python -m pip install --disable-pip-version-check --no-cache-dir --require-hashes -r fuzz-requirements.txt
      - name: Fuzz (60s per target on PRs, 300s nightly)
        env:
          FUZZ_SECONDS: ${{ github.event_name == 'schedule' && '300' || '60' }}
          PYTHONPATH: src:.
        run: bash tests/fuzz/run_atheris.sh
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crashes
          path: |
            crash-*
            oom-*
            timeout-*
          if-no-files-found: ignore
