[build-system]
requires = ["setuptools>=69.0.0"]
build-backend = "setuptools.build_meta"

[project]
name = "semantic-data-portal"
version = "0.3.0"
description = "Ontology-driven, graph-backed semantic data catalog with vector retrieval"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.112.0",
  "pydantic>=2.7.0",
  "uvicorn>=0.30.0",
]

[project.optional-dependencies]
# Postgres + Apache AGE (openCypher) + pgvector backend for the graph engine.
graph = [
  "SQLAlchemy>=2.0.0",
  "psycopg[binary]>=3.1.0",
]
dev = [
  "pytest>=8.2.0",
  "httpx>=0.27.0",
  "SQLAlchemy>=2.0.0",
  "psycopg[binary]>=3.1.0",
]

[tool.pytest.ini_options]
addopts = "-q"
markers = [
  "integration: requires a live Postgres with Apache AGE + pgvector (SDP_DATABASE_DSN)",
]

